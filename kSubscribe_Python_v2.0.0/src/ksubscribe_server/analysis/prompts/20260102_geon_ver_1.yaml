    2. **길이 준수**: 'long_summary'는 반드시 5문장 이하로 작성하여 세부적인 정보까지 포함해라.
    3. **언어 제약**: 생각(Reasoning)은 자유롭게 하되, **최종 답변(JSON 값)은 반드시 한국어**로 작성해라. (조사, 서술어 포함)
